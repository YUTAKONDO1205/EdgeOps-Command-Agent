name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

# OIDC (federated credential) needs id-token write permission
permissions:
  id-token: write
  contents: read


env:
  ACR_NAME: edgeopscmdacr
  IMAGE_NAME: edgeops-command-agent
  RG_NAME: rg-edgeops-agent
  APP_NAME: edgeops-command-agent
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push image
        run: |
          IMG=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker build -t $IMG .
          docker push $IMG
          echo "IMAGE=$IMG" >> $GITHUB_ENV

      - name: Update Container App
        run: |
          az containerapp update \
            -n ${{ env.APP_NAME }} \
            -g ${{ env.RG_NAME }} \
            --image $IMAGE
